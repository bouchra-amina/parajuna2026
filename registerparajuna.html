<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Parajuna 2025</title>
    <link rel="stylesheet" href="./registerparajuna.css">
</head>
<body>

<main class="container">

    <!-- LEFT -->
    <section class="left">
        <div class="title-box">
            <h1>PARAJUNA 2025</h1>
        </div>

        <p>Rejoignez un événement médical d'exception dédié à l'apprentissage, à l'innovation et au partage d'expertise.</p>
    </section>

    <!-- RIGHT -->
    <section class="right">
        <form id="registerForm">

            <h2>Inscription</h2>

            <div class="input-group">
                <input type="text" id="name" required>
                <label>Nom complet</label>
            </div>

            <div class="input-group">
                <input type="email" id="email" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <input type="tel" id="phone" required>
                <label>Téléphone</label>
            </div>

            <div class="input-group">
                <select id="profession" required>
                    <option value="" hidden></option>
                    <option value="medecin">Médecine</option>
                    <option value="dentaire">Dentaire</option>
                    <option value="pharmacie">Pharmacie</option>
                    <option value="autre">Autre</option>
                </select>
                <label>Profession</label>
            </div>

            <div class="input-group">
                <select id="program" required>
                    <option value="" hidden></option>
                    <option value="conferences">Conférences</option>
                    <option value="ateliers">Ateliers</option>
                    <option value="simulations">Simulations</option>
                    <option value="recherche">Recherche</option>
                </select>
                <label>Programme</label>
            </div>

            <button type="submit">Valider l'inscription</button>

            <p id="message"></p>
        </form>
    </section>

</main>

<!-- 🌌 POPUP MODAL -->
<div id="popup" class="popup hidden">
    <div class="popup-content">
        <h2>🎉 Inscription réussie</h2>
        <p id="popupText"></p>
        <button id="closePopup">OK</button>
    </div>
</div>

<script src="registerparajuna.js"></script>
</body>
</html>
