<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Parajuna 2025</title>
    <link rel="stylesheet" href="/registerparajuna.css">
</head>
<body>

<main class="container">

    <!-- PARTIE GAUCHE (Optionnelle, peut être masquée en CSS) -->
    <section class="left">
        <div class="title-box">
            <h1>PARAJUNA 2025</h1>
        </div>
        <p>Rejoignez un événement médical d'exception dédié à l'apprentissage et à l'innovation.</p>
    </section>

    <!-- PARTIE DROITE : LE FORMULAIRE -->
    <section class="right">
        <form id="registerForm" action="#" method="post">
            <h2>Inscription</h2>

            <!-- L'ordre est maintenant : LABEL puis INPUT -->
            <div class="input-group">
                <label for="name">Nom complet</label>
                <input type="text" id="name" name="name" autocomplete="name" placeholder="Votre nom" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" placeholder="exemple@mail.com" required>
            </div>

            <div class="input-group">
                <label for="phone">Téléphone</label>
                <input type="tel" id="phone" name="phone" autocomplete="tel" placeholder="0600000000" required>
            </div>

            <div class="input-group">
                <label for="profession">Profession</label>
                <select id="profession" name="profession" required>
                    <option value="" disabled selected hidden>Choisir...</option>
                    <option value="medecin">Médecine</option>
                    <option value="dentaire">Dentaire</option>
                    <option value="pharmacie">Pharmacie</option>
                    <option value="autre">Autre</option>
                </select>
            </div>

            <div class="input-group">
                <label for="program">Programme</label>
                <select id="program" name="program" required>
                    <option value="" disabled selected hidden>Choisir...</option>
                    <option value="conferences">Conférences</option>
                    <option value="ateliers">Ateliers</option>
                    <option value="simulations">Simulations</option>
                    <option value="recherche">Recherche</option>
                </select>
            </div>

            <button type="submit">Valider l'inscription</button>

            <p id="message" aria-live="polite"></p>
        </form>
    </section>

</main>

<!-- Popup de succès (vérifie que ton JS utilise bien ces IDs) -->
<div id="popup" class="hidden">
    <div class="popup-content">
        <p id="popupText"></p>
        <button id="closePopup">Génial !</button>
    </div>
</div>

<script src="registerparajuna.js"></script>
</body>
</html>
